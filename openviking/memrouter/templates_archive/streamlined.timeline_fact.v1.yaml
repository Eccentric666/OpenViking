schema_version: mem-router.backend-route-template.v1
template_id: streamlined.timeline_fact.v1
version: '2.1'
status: disabled
target:
  primary_backend_id: streamlined_memory_backend
  secondary_backend_ids: []
intent_family:
  name: timeline_fact_query
  description: Queries asking for facts anchored to a specific time, date, month, year, relative date, or event timestamp.
semantic_card: 'Use this template only when the user asks when something happened, what happened at a particular time, or
  which fact is constrained by a time expression and time itself is the core answer. It is NOT for general personal fact lookup
  without a time anchor, structured relation traversal, preference queries, or direct current-world tool use.

  '
