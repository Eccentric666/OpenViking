  secondary_backend_ids: []
intent_family:
  name: profile_state_lookup
  description: Queries about a person's identity, family, pets, health, occupation, relationship status, or current life state.
semantic_card: |
  Use this template when the query asks for a person's static profile attribute or current life state.
  Covers: identity, family members, pets, health conditions, job/career, relationship status, living situation,
  demographic facts. These are "who/what is this person" questions rather than "when did they do X" (temporal)
  or "how are they connected to Y" (graph). Includes direct attribute queries and status checks.
