hard_negatives:
- query: When did PERSON_A do ACTION_X?
  confusing_with_backend: streamlined_memory_backend
  reason: Temporal query, not profile state.
- query: How long has PERSON_A been doing ACTIVITY_X?
  confusing_with_backend: streamlined_memory_backend
  reason: Duration query, not static profile.
- query: What is the relationship between PERSON_A and PERSON_B?
  confusing_with_backend: graph_memory_backend
  reason: Entity relation query, not single-person profile.
- query: What did PERSON_A and PERSON_B have in common?
  confusing_with_backend: graph_memory_backend
  reason: Two-person commonality query.
- query: What books has PERSON_A read?
  confusing_with_backend: openviking_memory_backend
  reason: Activity/artifact list, covered by activity_artifact_lookup.
- query: What items did PERSON_A buy?
  confusing_with_backend: openviking_memory_backend
  reason: Activity/artifact list, covered by activity_artifact_lookup.
- query: Would PERSON_A prefer X or Y?
  confusing_with_backend: openviking_memory_backend
  reason: Preference comparison, covered by preference_profile.
- query: What is PERSON_A's favorite color?
  confusing_with_backend: openviking_memory_backend
  reason: Preference query, covered by preference_profile.
- query: How does PERSON_A feel about EVENT_X?
  confusing_with_backend: openviking_memory_backend
  reason: Subjective reasoning, covered by subjective_reasoning.
- query: Why did PERSON_A decide to do ACTION_X?
  confusing_with_backend: openviking_memory_backend
  reason: Causal/subjective reasoning.
- query: What caused EVENT_X?
  confusing_with_backend: graph_memory_backend
  reason: Causal graph query.
- query: How many children does PERSON_A have?
  confusing_with_backend: openviking_memory_backend
  reason: Count/list fact, covered by count_list_fact.
- query: Which countries has PERSON_A visited?
  confusing_with_backend: openviking_memory_backend
  reason: Count/list fact, covered by count_list_fact.
- query: When did Caroline go to the LGBTQ support group?
  confusing_with_backend: streamlined_memory_backend
  reason: Temporal fact, not profile state.
- query: What is the total cost of my recently purchased headphones and the iPad?
  confusing_with_backend: openviking_memory_backend
  reason: Aggregation query.
- query: What activities has Melanie done with her family?
  confusing_with_backend: graph_memory_backend
  reason: Involves multiple people ("with her family"), seeking shared activities — graph relation scope.
- query: What is Caroline's relationship status?
  confusing_with_backend: graph_memory_backend
  reason: Relationship status is a structural relation fact, better handled by graph backend.
- query: How did the extra funding help the school shown in the photo shared by John?
  confusing_with_backend: graph_memory_backend
  reason: Causal chain involving multiple entities (funding, school, photo), graph scope.
- query: What creative project do Mel and her kids do together besides pottery?
  confusing_with_backend: graph_memory_backend
  reason: Involves multiple people ("Mel and her kids"), seeking shared activity — graph relation.
- query: What did Mel and her kids paint in their latest project in July 2023?
  confusing_with_backend: graph_memory_backend
  reason: Involves multiple people ("Mel and her kids"), seeking joint creative output — graph scope.
- query: What kind of painting did Caroline share with Melanie on October 13, 2023?
  confusing_with_backend: graph_memory_backend
  reason: Social interaction between two people ("share with"), seeking shared content — graph scope.
query_spec:
  search_mode: search
  openviking:
    context_type: memory
    target_uri: viking://memories
    skip_intent_analysis: true
    typed_query_template:
      intent: profile_state_lookup
      priority: 1
      target_directories: null
thresholds:
  accept: 0.55
  fallback: 0.45
  margin: 0.04
  hard_negative_margin: 0.03
  hard_negative_penalty: 0.15
calibration:
  min_positive_examples: 30
  min_hard_negatives: 12
  expected_fallback_rate: 0.2
