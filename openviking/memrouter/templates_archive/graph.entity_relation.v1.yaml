schema_version: mem-router.backend-route-template.v1
template_id: graph.entity_relation.v1
version: '2.1'
status: enabled
target:
  primary_backend_id: graph_memory_backend
  secondary_backend_ids: []
intent_family:
  name: entity_relation_query
  description: Queries asking how entities, people, organizations, events, or objects are connected.
semantic_card: 'Use this template when the user asks about explicit relationships, connections, membership, collaboration,
  co-participation, discussion links, or entity-to-event associations. Covers all structured relations including person-event,
  person-entity, event-location, and entity-attribute links. The query usually contains at least two entities or asks for
  connected entities around one anchor entity. '
