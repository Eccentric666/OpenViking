schema_version: mem-router.backend-route-template.v1
template_id: openviking.count_list_fact.v1
version: '1.0'
status: enabled
target:
  primary_backend_id: openviking_memory_backend
  secondary_backend_ids: []
intent_family:
  name: count_list_fact
  description: Queries asking for a COUNT, LIST, or ENUMERATION of items. The answer is a list or a quantity, not a single fact, not a timestamp, not a subjective inference. "How many...?" asks for a count. "What types...?" "Which books/bands/items...?" "What are some...?" ask for a list. This is distinct from personal_fact_lookup (single fact), streamlined_memory_backend (temporal queries), and subjective_reasoning (opinion/explanation queries).
semantic_card: |
  This template matches queries where the user wants an enumeration or count of items from memory.

  Key patterns:
  - Count queries: "How many..." → expects a number (how many children, how many times, how many books)
  - List queries: "What types/which/what are some..." → expects a list (which bands, what hobbies, what languages)
  - Enumeration: "What does X collect/own/have..." → expects an inventory or set

  What this is NOT:
  - NOT a single fact lookup ("What is X's favorite book?" → personal_fact_lookup or preference)
  - NOT a temporal query ("How many days between X and Y?" "How many times in 2023?" → streamlined)
  - NOT a subjective inference ("Why did X read Y?" "What does X think about...?" → subjective_reasoning)
  - NOT a profile state query ("What is X's job?" "Where does X live?" → profile_state)
  - NOT a relation query ("What do X and Y have in common?" → graph_memory_backend)

  The answer form is always plural or numeric: a list, a set, a count, an enumeration.
