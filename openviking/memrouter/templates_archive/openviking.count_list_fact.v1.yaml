hard_negatives:
- query: How many days are there between X's birthday and Y's birthday?
  confusing_with_backend: streamlined_memory_backend
  reason: Asks for a duration/computation between two dates, not a count of items from memory. Requires temporal calculation.
- query: How many times has X gone to the gym in 2024?
  confusing_with_backend: streamlined_memory_backend
  reason: Contains "how many times" but has a strong temporal anchor ("in 2024") that makes it a time-bounded frequency query best handled by streamlined backend.
- query: How many years has X worked at Y?
  confusing_with_backend: streamlined_memory_backend
  reason: Asks for a duration derived from temporal boundaries (start date to present), not an enumeration from memory.
- query: What do X and Y have in common?
  confusing_with_backend: graph_memory_backend
  reason: Asks for shared attributes between two entities, which is a relation/intersection query, not a list from a single entity's memory.
- query: What is X's favorite book?
  confusing_with_backend: openviking_memory_backend
  reason: Although about books, asks for a single preference item, not a list or count. Maps to personal_fact_lookup or preference template.
- query: Why did X read "War and Peace"?
  confusing_with_backend: openviking_memory_backend
  reason: Asks for subjective reasoning/motivation behind an action, not a list or count of items.
- query: What is X's job?
  confusing_with_backend: openviking_memory_backend
  reason: Asks for a single profile state attribute, not an enumeration. Maps to profile_state template.
- query: What did X buy at the store yesterday?
  confusing_with_backend: openviking_memory_backend
  reason: Contains "what did X buy" but has a specific temporal anchor ("yesterday") and asks for a single event's details, not a general list of purchased items.
- query: Where does X live?
  confusing_with_backend: openviking_memory_backend
  reason: Asks for a single location fact, not a list or count. Maps to profile_state template.
- query: What is X's opinion on climate change?
  confusing_with_backend: openviking_memory_backend
  reason: Asks for a subjective opinion, not an enumeration. Maps to subjective_reasoning template.
- query: When did X start learning piano?
  confusing_with_backend: streamlined_memory_backend
  reason: Asks for a specific timestamp/event time, not a list or count.
- query: How long did X stay in Paris?
  confusing_with_backend: streamlined_memory_backend
  reason: Asks for a duration, not a count of items or a list.
- query: Who introduced X to jazz music?
  confusing_with_backend: graph_memory_backend
  reason: Asks for a specific relationship/connection between entities, not an enumeration from memory.
- query: What makes X happy?
  confusing_with_backend: openviking_memory_backend
  reason: Asks for subjective emotional drivers, not a concrete list or count. Maps to subjective_reasoning.
- query: Is X married?
  confusing_with_backend: openviking_memory_backend
  reason: Asks for a binary profile state fact, not a list or count. Maps to profile_state template.
query_spec:
  search_mode: search
  openviking:
    context_type: memory
    target_uri: viking://memories
    skip_intent_analysis: true
    typed_query_template:
      intent: count_list_fact
      priority: 1
      target_directories: null
thresholds:
