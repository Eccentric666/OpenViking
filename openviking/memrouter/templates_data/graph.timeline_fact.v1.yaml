schema_version: mem-router.backend-route-template.v1
template_id: graph.timeline_fact.v1
version: '2.1'
status: enabled
target:
  primary_backend_id: graph_memory_backend
  secondary_backend_ids: []
intent_family:
  name: graph_temporal_query
  description: Graph-based temporal queries asking for facts anchored to a specific
    time, date, month, year, relative date, or event timestamp.
semantic_card: 'Use this template when the query needs a time-anchored memory lookup:
  the user asks when/date an event happened, what happened at a specific date/month/year/time
  period, where/who/which fact was true at that time, or the last/first occurrence
  of an event. A time expression must be the answer or the primary retrieval anchor.
  Do NOT use it for elapsed duration calculation, event ordering, pure count/list
  queries, structured entity relations, preferences, subjective reasoning, or general
  personal facts without a temporal anchor.'
