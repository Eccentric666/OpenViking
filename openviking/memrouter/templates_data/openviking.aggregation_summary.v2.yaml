schema_version: mem-router.backend-route-template.v1
template_id: openviking.aggregation_summary.v2
version: '2.0'
status: enabled
target:
  primary_backend_id: openviking_memory_backend
  secondary_backend_ids: []
intent_family:
  name: aggregation_summary
  description: User asks for aggregation, comparison, summary, or list across multiple
    memory fragments.
semantic_card: 'Use this template when the query requires combining, comparing, or
  summarizing multiple subjective memory pieces (preferences, habits, experiences)
  rather than retrieving a single concrete fact or structured relation. Signals include:
  compare preferences, overall trend, common themes, suggestions based on accumulated
  context, or summary of subjective experiences. Does NOT cover entity-attribute totals,
  person-event lists, or pure temporal durations.

  '
query_prototypes:
- Compare two preferences
- Summarize someone's experiences
- What is the overall trend?
- Which option is better based on past behavior?
- What are the common themes?
- What is the combined result?
- Would PERSON_A prefer OPTION_A or OPTION_B?
- Can you suggest some ACTIVITY_X based on my preferences?
- What is the overall METRIC_X across all EVENT_X?
- Which ITEM_X is better based on my past BEHAVIOR_X?
- What are the common ATTRIBUTE_X in my COLLECTION_X?
- Would PERSON_A prefer working on a ITEM_A or a ITEM_B?
- Can you suggest some activities that I can do in the evening?
- Compare my spending habits across different categories
- Which store gave me better discounts overall?
- What are the main factors that influenced my career choice?
- Can you suggest new recipes based on my meal prep preferences?
- What recipes should I try for next week's meal prep?
- I'm planning my meal prep next week, any recipe suggestions?
- Can you recommend interesting cultural events near me this weekend?
- What cultural events should I consider based on my interests?
- Suggest weekend activities that fit my preferences.
- What other exercises can help with basketball performance?
- Can you suggest exercises based on someone's sports goals?
- What activities would help someone improve their athletic performance?
- What should I try next based on what I usually enjoy?
hard_negatives:
- query: Which items did PERSON_A buy in MONTH_YEAR from stored memories?
  confusing_with_backend: graph_memory_backend
  reason: Single purchase fact (person-entity relation), not aggregation
- query: Where did PERSON_A get PET_X from?
  confusing_with_backend: openviking_memory_backend
  reason: Single origin fact, not aggregation
- query: At what time did PERSON_A visit networking events for his store?
  confusing_with_backend: streamlined_memory_backend
  reason: Single temporal fact
- query: What number of days before I bought the ITEM_X did I attend the EVENT_X in
    the remembered context?
  confusing_with_backend: streamlined_memory_backend
  reason: Duration comparison between two events, not multi-fragment aggregation
- query: PERSON_A 和 PERSON_B 是什么关系？
  confusing_with_backend: graph_memory_backend
  reason: Relation query
- query: Which factor caused SYSTEM_ISSUE_X based on remembered facts?
  confusing_with_backend: graph_memory_backend
  reason: Causal query
- query: Which detail is my ethnicity?
  confusing_with_backend: openviking_memory_backend
  reason: Single profile attribute, not aggregation
- query: What does PERSON_A do with her family on hikes?
  confusing_with_backend: openviking_memory_backend
  reason: Single habit description, not aggregation
- query: What time management techniques do PERSON_A and PERSON_B use from memory?
  confusing_with_backend: openviking_memory_backend
  reason: Preference query, not summary/aggregation
- query: What to photograph during install?
  confusing_with_backend: graph_memory_backend
  reason: System procedure query, not subjective aggregation
- query: Which profile favors long-term diversity?
  confusing_with_backend: graph_memory_backend
  reason: System configuration relation, not aggregation
- query: Which objects are considered core?
  confusing_with_backend: graph_memory_backend
  reason: Entity classification relation, not aggregation
- query: What's first debugging step?
  confusing_with_backend: graph_memory_backend
  reason: System procedure relation, not aggregation
query_spec:
  search_mode: search
  openviking:
    context_type: memory
    target_uri: viking://memories
    skip_intent_analysis: true
    typed_query_template:
      intent: aggregation_summary
      priority: 1
      target_directories: null
thresholds:
  accept: 0.58
  fallback: 0.58
  margin: 0.04
  hard_negative_margin: 0.03
  hard_negative_penalty: 0.06
calibration:
  min_positive_examples: 20
  min_hard_negatives: 10
  expected_fallback_rate: 0.2
