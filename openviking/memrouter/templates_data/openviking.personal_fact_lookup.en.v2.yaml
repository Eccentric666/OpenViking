schema_version: mem-router.backend-route-template.v1
template_id: openviking.personal_fact_lookup.en.v2
version: '2.1'
status: enabled
target:
  primary_backend_id: openviking_memory_backend
  secondary_backend_ids: []
intent_family:
  name: personal_fact_lookup
  description: User asks for a specific fact, object, item, place, status, or attribute
    about themselves or a known person.
semantic_card: 'Use this template for a single concrete personal fact or memory detail
  that is not better handled by a specialized template: specific objects, possessions,
  one-off facts, explicit details from an experience, factual attributes, or remembered
  statements. Do NOT use it for stable profile-state attributes, stated preferences/habits/routines/goals,
  subjective why/would/likely reasoning, temporal lookup, duration/count questions,
  or structured entity relations.'
query_prototypes:
- What memory stands out from someones trip?
- What challenge did someone face?
- What accomplishment is someone proud of?
- What obstacle did someone overcome?
- What kind of CAR_X does PERSON_A drive?
- What are PERSON_A's health problems?
- What did PERSON_A research?
- What activities has PERSON_A pursued?
- What wouldn't cause discomfort to PERSON_A?
- What kind of places have PERSON_A checked out?
- What kind of indoor activities has PERSON_A done?
- What things has PERSON_A broken?
- Which hobby did PERSON_A take up?
- What stands out to PERSON_A from their EVENT_X?
- What challenge did PERSON_A face during ACTIVITY_X?
- What accomplishment is PERSON_A proud of from TIME_PERIOD?
- What obstacle did PERSON_A overcome in EVENT_X?
- What kind of CATEGORY_X does PERSON_A have?
- What ITEM_X has PERSON_A ACTION_X?
- What are PERSON_A's ATTRIBUTE_X?
- What did PERSON_A research about TOPIC_X?
- How does PERSON_A describe the support he received during his journey?
- What does PERSON_A say about the relief of someone whose car he fixed?
- What kind of car does PERSON_A drive?
- What are PERSON_A's suspected health problems?
- What fields would PERSON_A be likely to pursue in her education?
- What pets wouldn't cause any discomfort to PERSON_A?
- How does PERSON_A describe using ITEM_X?
- What does PERSON_A say about their journey to JOB_X?
- What stands out to PERSON_A from his trip to PLACE_X?
- What challenge did PERSON_A face when starting BUSINESS_X?
- What accomplishment is PERSON_A proud of from ACTIVITY_X?
- What personal goal is PERSON_A working toward with her designs?
- What memory does PERSON_A cherish from EVENT_X?
- Which bands has PERSON_A enjoyed listening to?
- Which of PERSON_A's family and friends have passed away?
- What kind of personal facts are known about PERSON_A?
- What did PERSON_A say about TOPIC_X on DATE_X?
- What NOUN_X does PERSON_A have for PURPOSE_X?
- What did PERSON_A do for PERSON_B on DATE_X?
hard_negatives:
- query: At what time did PERSON_A visit networking events for his store from memory?
  confusing_with_backend: streamlined_memory_backend
  reason: Temporal fact, not personal object/fact lookup
- query: PERSON_A 与 PERSON_B 的关系是什么？
  confusing_with_backend: graph_memory_backend
  reason: Relation query, not personal fact
- query: Which week did PERSON_A visit the PLACE_X for the EVENT_X?
  confusing_with_backend: streamlined_memory_backend
  reason: Temporal fact, not personal memory
- query: What number of days before I bought the ITEM_X did I attend the EVENT_X from
    memory?
  confusing_with_backend: streamlined_memory_backend
  reason: Duration comparison, not personal fact
- query: How many days had passed between the EVENT_A and the EVENT_B at PLACE_X?
  confusing_with_backend: streamlined_memory_backend
  reason: Duration comparison, not personal fact
- query: At what time did PERSON_A announce his marriage to his extended family?
  confusing_with_backend: streamlined_memory_backend
  reason: Timeline fact, not personal object lookup
- query: What event happened first, the meeting with PERSON_A or the pride parade?
  confusing_with_backend: streamlined_memory_backend
  reason: Sequence reasoning, not personal fact
- query: What number of months before my anniversary did PERSON_A get engaged?
  confusing_with_backend: streamlined_memory_backend
  reason: Temporal duration, not personal fact
- query: For how long has PERSON_A been doing ACTIVITY_X from memory?
  confusing_with_backend: streamlined_memory_backend
  reason: Temporal duration query, not personal fact lookup
- query: For how long did it take PERSON_A to finish TASK_X?
  confusing_with_backend: streamlined_memory_backend
  reason: Temporal duration, not personal attribute
- query: What number of months passed between EVENT_A and EVENT_B?
  confusing_with_backend: streamlined_memory_backend
  reason: Temporal interval, not personal fact
- query: When was the last time PERSON_A did ACTION_X from memory?
  confusing_with_backend: streamlined_memory_backend
  reason: Temporal recency query, not personal fact
- query: At what time did PERSON_A plan on doing ACTION_X?
  confusing_with_backend: streamlined_memory_backend
  reason: Future plan timestamp, not personal fact
- query: What book did PERSON_A read in MONTH_YEAR?
  confusing_with_backend: streamlined_memory_backend
  reason: Time-anchored fact lookup handled by timeline_fact, not general personal_fact.
- query: At what time did PERSON_A get their first ITEM_X?
  confusing_with_backend: streamlined_memory_backend
  reason: Temporal acquisition query, not personal attribute
- query: PERSON_A 的朋友有哪些？
  confusing_with_backend: graph_memory_backend
  reason: Entity relation traversal
- query: Which factor caused SYSTEM_ISSUE_X in this memory case?
  confusing_with_backend: graph_memory_backend
  reason: Causal multi-hop query
- query: What evidence confirms ROUTING_BALANCE_X?
  confusing_with_backend: graph_memory_backend
  reason: System dependency query
- query: What triggers rollback decisions?
  confusing_with_backend: graph_memory_backend
  reason: System dependency query
- query: What is the total cost of my recently purchased headphones and the iPad?
  confusing_with_backend: openviking_memory_backend
  reason: Aggregation query, not single fact
- query: Would PERSON_A likely prefer working on ITEM_A or ITEM_B?
  confusing_with_backend: openviking_memory_backend
  reason: Preference comparison, not single fact
- query: Could you suggest some activities that I can do in the evening?
  confusing_with_backend: openviking_memory_backend
  reason: Suggestion query, not factual lookup
- query: Which book was PERSON_A reading during his recovery from an ankle injury?
  confusing_with_backend: graph_memory_backend
  reason: Person-object relation, not subjective experience
- query: What kind of tattoo does PERSON_A have on her arm?
  confusing_with_backend: graph_memory_backend
  reason: Person-attribute relation, not subjective experience
- query: Does PERSON_A's shop employ a lot of people?
  confusing_with_backend: graph_memory_backend
  reason: Organization relation, not subjective experience
- query: Which city has 1.2 million residents?
  confusing_with_backend: graph_memory_backend
  reason: Entity-attribute relation, not subjective experience
- query: What can tasks link to from memory?
  confusing_with_backend: graph_memory_backend
  reason: Entity-entity relation, not subjective experience
- query: Which API_PATH_X starts all calls?
  confusing_with_backend: graph_memory_backend
  reason: System entity relation, not subjective experience
- query: Which year did PERSON_A start practicing yoga?
  confusing_with_backend: streamlined_memory_backend
  reason: Temporal fact, not subjective experience
- query: Which things do PERSON_A and PERSON_B have in common from memory?
  confusing_with_backend: graph_memory_backend
  reason: Two-person relation/commonality query, not single-person fact lookup.
- query: What places or events have PERSON_A and PERSON_B planned to meet at from
    memory?
  confusing_with_backend: graph_memory_backend
  reason: Two-person relation/commonality query, not single-person fact lookup.
- query: What country do PERSON_A and PERSON_B want to meet in?
  confusing_with_backend: graph_memory_backend
  reason: Two-person relation/commonality query, not single-person fact lookup.
- query: Do PERSON_A and PERSON_B both own pets?
  confusing_with_backend: graph_memory_backend
  reason: Two-person relation/commonality query, not single-person fact lookup.
- query: Which kind of interests do PERSON_A and PERSON_B share?
  confusing_with_backend: graph_memory_backend
  reason: Two-person relation/commonality query, not single-person fact lookup.
- query: Which place did PERSON_A move from 4 years ago?
  confusing_with_backend: streamlined_memory_backend
  reason: Asks for origin location, not the time of move.
- query: Which person supports PERSON_A when they have a negative experience?
  confusing_with_backend: streamlined_memory_backend
  reason: Asks for a person/supporter, not a timestamp. "when" is conditional.
- query: What does PERSON_A say ACTIVITY_X has been great for from memory?
  confusing_with_backend: streamlined_memory_backend
  reason: Asks for benefit/reason, not a time.
- query: Which place did PERSON_A explore on a road trip last year?
  confusing_with_backend: streamlined_memory_backend
  reason: Asks for location, not the time.
- query: Which thing did PERSON_A receive from their brother that brought back childhood
    memories?
  confusing_with_backend: streamlined_memory_backend
  reason: Asks for a gift/item, not a time.
- query: What significant event happened in PERSON_A's life towards the end of TIME_PERIOD
    from memory?
  confusing_with_backend: streamlined_memory_backend
  reason: Asks for event description, not the date/time.
- query: Which kind of online group did PERSON_A join?
  confusing_with_backend: streamlined_memory_backend
  reason: Asks for group type, not join date.
- query: When was the last time PERSON_A visited PLACE_X?
  confusing_with_backend: streamlined_memory_backend
  reason: Temporal recency query, not personal fact.
- query: What happened first, EVENT_A or EVENT_B in the remembered context?
  confusing_with_backend: streamlined_memory_backend
  reason: Sequence reasoning, not personal fact.
- query: At what time did PERSON_A first do ACTION_X?
  confusing_with_backend: streamlined_memory_backend
  reason: First-occurrence timestamp, not personal fact.
- query: How many days elapsed between EVENT_A and EVENT_B for this non-personal-fact
    case?
  confusing_with_backend: streamlined_memory_backend
  reason: Temporal interval, not personal fact.
- query: Which thing did PERSON_A share a photo of when mentioning unwinding at home
    from memory?
  confusing_with_backend: streamlined_memory_backend
  reason: Asks for photo subject, not timestamp.
- query: How will PERSON_A share the recipe with the other person from memory?
  confusing_with_backend: streamlined_memory_backend
  reason: Asks for method, not time.
- query: Which place was the forest picture shared by PERSON_A on DATE_X taken from
    memory?
  confusing_with_backend: streamlined_memory_backend
  reason: Asks for photo location, not date.
- query: Which detail is the topic of discussion between PERSON_A and PERSON_B on
    DATE_X?
  confusing_with_backend: streamlined_memory_backend
  reason: Asks for topic, not time.
- query: What kind of ACTIVITY_X has PERSON_A pursued with PERSON_B?
  confusing_with_backend: graph_memory_backend
  reason: Co-activity relation query, not single-person fact lookup.
query_spec:
  search_mode: search
  openviking:
    context_type: memory
    target_uri: viking://memories
    skip_intent_analysis: true
    typed_query_template:
      intent: personal_fact_lookup
      priority: 1
      target_directories: null
thresholds:
  accept: 0.51
  fallback: 0.46
  margin: 0.02
  hard_negative_margin: 0.03
  hard_negative_penalty: 0.15
calibration:
  min_positive_examples: 35
  min_hard_negatives: 15
  expected_fallback_rate: 0.15
