schema_version: mem-router.backend-route-template.v1
template_id: openviking.preference_profile.v1
version: '1.0'
status: enabled
target:
  primary_backend_id: openviking_memory_backend
  secondary_backend_ids: []
intent_family:
  name: preference_profile
  description: User asks about their own preferences, habits, lifestyle choices, personal
    profile, or subjective experiences.
semantic_card: Use this template for direct preference, habit, routine, lifestyle-choice,
  goal, coping-style, or formatting-style recall. The answer should be an explicitly
  stated stable preference or routine, not an inferred mental state. Do NOT use it
  for previous-chat recall, static identity/demographic profile facts, temporal lookup,
  duration/count questions, structured entity relations, or subjective why/would/likely
  reasoning.
query_prototypes:
- What is someone's preference?
- What does someone prefer?
- What is someone's habit?
- What does someone usually do?
- What is someone's lifestyle like?
- How does someone prefer to work?
- What is someone's preferred technique for managing time?
- What is someone's favorite way to do something?
- What does someone enjoy doing?
- What is someone's daily routine?
- What is someone's personal style?
- What time management techniques do PERSON_A and PERSON_B use?
- What is the biggest stressor in PERSON_A's life besides ITEM_X?
- How does PERSON_A prefer to ACTION_X?
- What is PERSON_A's favorite CATEGORY_X?
- What does PERSON_A enjoy doing in TIME_PERIOD?
- What is PERSON_A's preferred TOOL_X?
- What lifestyle choice does PERSON_A make about TOPIC_X?
- What coping mechanism does PERSON_A use for EVENT_X?
- What is PERSON_A's preferred work style?
- What is my preferred communication style?
- How do I like my reports formatted?
- What is my favorite programming language?
- What kind of music do I prefer?
- What are PERSON_A's goals for ACTIVITY_X?
- What are my short-term fitness goals?
- What does PERSON_A want to achieve in her new role?
- What does PERSON_A do in his free time besides gaming?
- What other interests does PERSON_A have besides painting?
- What coping mechanism does someone use for stressful situations?
- How does someone handle pressure at work?
- What is someone's preferred way to relax?
- What time does someone usually go to the gym?
- What time do I usually exercise?
- What is someone's usual workout schedule?
- What other exercises can help someone with sports performance?
- What fitness habits support someone's athletic goals?
- What is PERSON_A's daily routine?
- What is PERSON_A's lifestyle like?
- What is PERSON_A's exercise routine?
- What is PERSON_A's diet like?
- What goals is PERSON_A working toward?
hard_negatives:
- query: Which items did PERSON_A buy in MONTH_YEAR in the remembered context?
  confusing_with_backend: openviking_memory_backend
  reason: Concrete purchase fact, not preference
- query: Which place did PERSON_A get PET_X from?
  confusing_with_backend: openviking_memory_backend
  reason: Concrete origin fact, not preference
- query: At what time did PERSON_A visit networking events for his store in the remembered
    context?
  confusing_with_backend: streamlined_memory_backend
  reason: Temporal fact, not preference
- query: What number of days before I bought the ITEM_X did I attend the EVENT_X?
  confusing_with_backend: streamlined_memory_backend
  reason: Duration comparison, not preference
- query: PERSON_A 和 PERSON_B 之间是什么关系？
  confusing_with_backend: graph_memory_backend
  reason: Entity relation query
- query: Which factor caused SYSTEM_ISSUE_X from stored memories?
  confusing_with_backend: graph_memory_backend
  reason: Causal multi-hop query
- query: Which detail is the total cost of my recently purchased headphones and the
    iPad?
  confusing_with_backend: openviking_memory_backend
  reason: Aggregation query, not single preference
- query: What groups search queries reliably?
  confusing_with_backend: graph_memory_backend
  reason: System mechanism query
- query: What to photograph during install from memory?
  confusing_with_backend: openviking_memory_backend
  reason: Technical instruction, not personal preference
- query: What two IDs must TRANSACTION_X include?
  confusing_with_backend: graph_memory_backend
  reason: System rule query
- query: Could you suggest some activities that I can do in the evening from memory?
  confusing_with_backend: openviking_memory_backend
  reason: Suggestion request, not chat recall or preference
- query: What book was PERSON_A reading during his recovery from an ankle injury?
  confusing_with_backend: graph_memory_backend
  reason: Person-object relation, not preference
- query: Which kind of tattoo does PERSON_A have on her arm?
  confusing_with_backend: graph_memory_backend
  reason: Person-attribute relation, not preference
- query: Does PERSON_A's business employ a lot of people?
  confusing_with_backend: graph_memory_backend
  reason: Organization relation, not preference
- query: What city has 1.2 million residents?
  confusing_with_backend: graph_memory_backend
  reason: Entity-attribute relation, not preference
- query: What can tasks link to in the remembered context?
  confusing_with_backend: graph_memory_backend
  reason: Entity-entity relation, not preference
- query: What API_PATH_X starts all calls?
  confusing_with_backend: graph_memory_backend
  reason: System entity relation, not preference
- query: What activities does PERSON_A pursue besides practicing and teaching yoga?
  confusing_with_backend: graph_memory_backend
  reason: Activity enumeration, not preference/profile
- query: Which type of vacation would PERSON_A prefer with his family, walking tours
    in metropolitan cities or camping trip in the outdoors?
  confusing_with_backend: graph_memory_backend
  reason: Involves multiple entities (Evan + family) and asks about shared/group preference,
    which is a relation/commonality query.
- query: What would be an appropriate gift for both PERSON_A and PERSON_B to encourage
    their healthy lifestyles from memory?
  confusing_with_backend: graph_memory_backend
  reason: Involves two people and asks about a shared/common appropriate action, not
    a single person's preference.
- query: Which holiday would both PERSON_A and PERSON_B enjoy celebrating together?
  confusing_with_backend: graph_memory_backend
  reason: Asks about shared preference between two people, which is a relation/commonality
    query.
- query: How often does PERSON_A do ACTIVITY_X with PERSON_B?
  confusing_with_backend: graph_memory_backend
  reason: Co-activity frequency with another person should route to graph entity relation.
query_spec:
  search_mode: search
  openviking:
    context_type: memory
    target_uri: viking://memories/preferences
    skip_intent_analysis: true
    typed_query_template:
      intent: preference_profile
      priority: 1
      target_directories: null
thresholds:
  accept: 0.54
  fallback: 0.5
  margin: 0.03
  hard_negative_margin: 0.03
  hard_negative_penalty: 0.15
calibration:
  min_positive_examples: 25
  min_hard_negatives: 10
  expected_fallback_rate: 0.2
