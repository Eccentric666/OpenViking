schema_version: "mem-router.backend-route-template.v1"
template_id: "openviking.preference_profile.v1"
version: "1.0"
status: "enabled"

target:
  primary_backend_id: "openviking_memory_backend"
  secondary_backend_ids: []

intent_family:
  name: "preference_profile"
  description: "User asks about their own preferences, habits, lifestyle choices, personal profile, or subjective experiences."

semantic_card: >
  Use this template when the query is about what the user likes, prefers,
  routinely does, or how they describe themselves. This includes habits,
  lifestyle, personal background, ethnicity, stressors, coping mechanisms,
  time-management techniques, and any question that seeks a subjective or
  profile-oriented answer. It does NOT cover structured relations between
  entities, temporal ordering, or system dependency queries.

query_prototypes:
  # Abstract layer
  - "What is someone's preference?"
  - "What does someone prefer?"
  - "What is someone's habit?"
  - "What does someone usually do?"
  - "What is someone's lifestyle like?"
  - "What is someone's background?"
  - "What is someone's ethnicity?"
  - "What is the biggest stressor in someone's life?"
  - "How does someone prefer to work?"
  - "What does someone do on hikes?"
  - "What is someone's preferred technique for managing time?"
  - "What is someone's favorite way to do something?"
  - "What does someone enjoy doing?"
  - "What is someone's daily routine?"
  - "What is someone's personal style?"

  # Slot layer
  - "What time management techniques do {person} and {person2} use?"
  - "What is the biggest stressor in {person}'s life besides {thing}?"
  - "What is my {personal_attribute}?"
  - "How does {person} prefer to {action}?"
  - "What is {person}'s favorite {category}?"
  - "What does {person} enjoy doing in {time_of_day}?"
  - "What is {person}'s preferred {tool_or_method}?"
  - "What lifestyle choice does {person} make about {topic}?"
  - "What coping mechanism does {person} use for {situation}?"

  # Benchmark-derived layer
  - "What time management techniques do Deborah and Jolene use?"
  - "What does Melanie do with her family on hikes?"
  - "What is the biggest stressor in Andrew's life besides not being able to hike frequently?"
  - "What is my ethnicity?"
  - "Would Dave prefer working on a Dodge Charger or a Subaru Forester?"
  - "What is Dave's preferred work style?"
  - "How does John describe the support he received during his journey?"
  - "What passion does John mention connects him with people?"

  # Concrete layer
  - "What is my preferred communication style?"
  - "How do I like my reports formatted?"
  - "What is my favorite programming language?"
  - "What kind of music do I prefer?"

  # Chat meta-reference layer (merged from previous_chat_recall)
  - "我之前说过我喜欢什么沟通方式吗？"
  - "你记得我的代码风格偏好吗？"
  - "我之前告诉过你我的技术背景吗？"
  - "按我的偏好来处理这个任务"
  - "我平时希望你怎么给我汇报？"
  - "你记得我说过我在学什么吗？"
  - "我上次跟你提过我的项目进展吗？"
  - "我们之前讨论过我的时间表吗？"
  - "你还记得我对这个问题的看法吗？"
  - "我跟你说过我打算怎么做吗？"
  - "上次聊天时我提到的那个工具叫什么？"
  - "我之前让你记住什么？"
  - "你还记得我的配置偏好吗？"
  - "我提到过我最擅长的领域吗？"
  - "你记得我之前给你的要求吗？"

  # v2 expansion — coverage gaps from Natural audit
  - "What are John's goals with regards to his basketball career?"
  - "What are my short-term fitness goals?"
  - "What does Sarah want to achieve in her new role?"
  - "Why does Dave regularly visit parks?"
  - "Why does Lisa prefer working from home?"
  - "What motivates Tom to exercise every morning?"
  - "What does Mark do in his free time besides gaming?"
  - "What other interests does Jenny have besides painting?"
  - "How does John describe the support he received during his journey?"
  - "What passion does John mention connects him with people?"
  - "What coping mechanism does someone use for stressful situations?"
  - "How does someone handle pressure at work?"
  - "What is someone's preferred way to relax?"
  - "What time does someone usually go to the gym?"
  - "What time do I usually exercise?"
  - "What is someone's usual workout schedule?"
  - "Why does someone sometimes put off doing a routine?"
  - "Why does someone delay a personal habit?"
  - "What reasons does someone have for postponing an activity?"
  - "What other exercises can help someone with sports performance?"
  - "What fitness habits support someone's athletic goals?"
  - "What activities should someone try based on their personal goals?"

hard_negatives:
  - query: "What items did Calvin buy in March 2023?"
    confusing_with_backend: "openviking_memory_backend"
    reason: "Concrete purchase fact, not preference"
  - query: "Where did Audrey get Pixie from?"
    confusing_with_backend: "openviking_memory_backend"
    reason: "Concrete origin fact, not preference"
  - query: "When did Jon visit networking events for his store?"
    confusing_with_backend: "streamlined_memory_backend"
    reason: "Temporal fact, not preference"
  - query: "How many days before I bought the iPhone 13 Pro did I attend the Holiday Market?"
    confusing_with_backend: "streamlined_memory_backend"
    reason: "Duration comparison, not preference"
  - query: "Jon 和 Gina 是什么关系？"
    confusing_with_backend: "graph_memory_backend"
    reason: "Entity relation query"
  - query: "What caused split-brain dedupe?"
    confusing_with_backend: "graph_memory_backend"
    reason: "Causal multi-hop query"
  - query: "What is the total cost of my recently purchased headphones and the iPad?"
    confusing_with_backend: "openviking_memory_backend"
    reason: "Aggregation query, not single preference"
  - query: "What groups search queries reliably?"
    confusing_with_backend: "graph_memory_backend"
    reason: "System mechanism query"
  - query: "What to photograph during install?"
    confusing_with_backend: "openviking_memory_backend"
    reason: "Technical instruction, not personal preference"
  - query: "Which two IDs must purchases include?"
    confusing_with_backend: "graph_memory_backend"
    reason: "System rule query"
  # Merged from previous_chat_recall hard negatives
  - query: "Can you suggest some activities that I can do in the evening?"
    confusing_with_backend: "openviking_memory_backend"
    reason: "Suggestion request, not chat recall or preference"
  # v4 relation-first hard negatives
  - query: "Which book was John reading during his recovery from an ankle injury?"
    confusing_with_backend: "graph_memory_backend"
    reason: "Person-object relation, not preference"
  - query: "What kind of tattoo does Audrey have on her arm?"
    confusing_with_backend: "graph_memory_backend"
    reason: "Person-attribute relation, not preference"
  - query: "Does Dave's shop employ a lot of people?"
    confusing_with_backend: "graph_memory_backend"
    reason: "Organization relation, not preference"
  - query: "Which city has 1.2 million residents?"
    confusing_with_backend: "graph_memory_backend"
    reason: "Entity-attribute relation, not preference"
  - query: "What can tasks link to?"
    confusing_with_backend: "graph_memory_backend"
    reason: "Entity-entity relation, not preference"
  - query: "Which API path starts all calls?"
    confusing_with_backend: "graph_memory_backend"
    reason: "System entity relation, not preference"
  - query: "What activities does Deborah pursue besides practicing and teaching yoga?"
    confusing_with_backend: "graph_memory_backend"
    reason: "Activity enumeration, not preference/profile"
  # v5 — preference query involving multiple entities should NOT be preference
  - query: "Which type of vacation would Evan prefer with his family, walking tours in metropolitan cities or camping trip in the outdoors?"
    confusing_with_backend: "graph_memory_backend"
    reason: "Involves multiple entities (Evan + family) and asks about shared/group preference, which is a relation/commonality query."
  - query: "What would be an appropriate gift for both Evan and Sam to encourage their healthy lifestyles?"
    confusing_with_backend: "graph_memory_backend"
    reason: "Involves two people and asks about a shared/common appropriate action, not a single person's preference."
  - query: "Which holiday would both PERSON_A and PERSON_B enjoy celebrating together?"
    confusing_with_backend: "graph_memory_backend"
    reason: "Asks about shared preference between two people, which is a relation/commonality query."

query_spec:
  search_mode: "search"
  openviking:
    context_type: "memory"
    target_uri: "viking://memories/preferences"
    skip_intent_analysis: true
    typed_query_template:
      intent: "preference_profile"
      priority: 1
      target_directories: null

thresholds:
  accept: 0.65
  fallback: 0.58
  margin: 0.04
  hard_negative_margin: 0.03
  hard_negative_penalty: 0.15

calibration:
  min_positive_examples: 25
  min_hard_negatives: 10
  expected_fallback_rate: 0.20
