schema_version: mem-router.backend-route-template.v1
template_id: openviking.activity_artifact_lookup.v1
version: '1.0'
status: enabled
target:
  primary_backend_id: openviking_memory_backend
  secondary_backend_ids: []
intent_family:
  name: activity_artifact_lookup
  description: >
    Queries asking what a person DID, VISITED, READ, BOUGHT, CREATED, ATTENDED,
    or EXPERIENCED. The focus is on the activity or artifact itself — the concrete
    action, object, place, or event. This is NOT about when it happened (temporal),
    NOT about relationships between people (graph), NOT about subjective reasons
    or feelings (why/how did they feel), NOT about preferences or favorites, and
    NOT about counts or lists of types.
semantic_card: |
  This template routes queries that seek concrete activities, artifacts, or experiences
  associated with a person. The core intent is "what did they do / what did they interact with."

  IN-SCOPE examples:
    - "What books has Caroline read?"
    - "What places did Melanie visit?"
    - "What did X paint?"
    - "What concerts has X attended?"
    - "What food did X eat at the restaurant?"
    - "What items did X buy?"
    - "What trips has X taken?"
    - "What sports has X played?"
    - "What movies has X watched?"
    - "What workshops did X attend?"

  OUT-OF-SCOPE (route elsewhere):
    - Temporal: "When did Caroline read the book?" → streamlined_memory_backend
    - Duration: "How long has Melanie been reading?" → streamlined_memory_backend
    - Relationship: "What did Caroline and Melanie do together?" → graph_memory_backend
    - Commonality: "What activities do Caroline and Melanie share?" → graph_memory_backend
    - Subjective: "Why did Caroline read that book?" → openviking_memory_backend (subjective)
    - Preference: "What is Melanie's favorite book?" → openviking_memory_backend (preference)
    - Count/List: "How many books has Caroline read?" → openviking_memory_backend (count)
    - Profile: "What is Caroline's reading habit?" → openviking_memory_backend (profile_state)

  Key discriminators:
    - Contains a person entity and an activity/artifact category.
    - No temporal anchor (when, last time, recently, before, after, during).
    - No relationship between multiple people (with, together, both).
    - No subjective or evaluative language (why, feel, think, opinion).
    - No quantification (how many, count, total number).
    - No preference signal (favorite, best, most liked, prefer).
