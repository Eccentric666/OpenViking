schema_version: mem-router.backend-route-template.v1
template_id: openviking.activity_artifact_lookup.v1
version: '1.0'
status: enabled
target:
  primary_backend_id: openviking_memory_backend
  secondary_backend_ids: []
intent_family:
  name: activity_artifact_lookup
  description: 'Queries asking what a person DID, VISITED, READ, BOUGHT, CREATED,
    ATTENDED, or EXPERIENCED. The focus is on the activity or artifact itself — the
    concrete action, object, place, or event. This is NOT about when it happened (temporal),
    NOT about relationships between people (graph), NOT about subjective reasons or
    feelings (why/how did they feel), NOT about preferences or favorites, and NOT
    about counts or lists of types.

    '
semantic_card: "This template routes queries that seek concrete activities, artifacts,\
  \ or experiences\nassociated with a person. The core intent is \"what did they do\
  \ / what did they interact with.\"\n\nIN-SCOPE examples:\n  - \"What books has Caroline\
  \ read?\"\n  - \"What places did Melanie visit?\"\n  - \"What did X paint?\"\n \
  \ - \"What concerts has X attended?\"\n  - \"What food did X eat at the restaurant?\"\
  \n  - \"What items did X buy?\"\n  - \"What trips has X taken?\"\n  - \"What sports\
  \ has X played?\"\n  - \"What movies has X watched?\"\n  - \"What workshops did\
  \ X attend?\"\n\nOUT-OF-SCOPE (route elsewhere):\n  - Temporal: \"When did Caroline\
  \ read the book?\" → streamlined_memory_backend\n  - Duration: \"How long has Melanie\
  \ been reading?\" → streamlined_memory_backend\n  - Relationship: \"What did Caroline\
  \ and Melanie do together?\" → graph_memory_backend\n  - Commonality: \"What activities\
  \ do Caroline and Melanie share?\" → graph_memory_backend\n  - Subjective: \"Why\
  \ did Caroline read that book?\" → openviking_memory_backend (subjective)\n  - Preference:\
  \ \"What is Melanie's favorite book?\" → openviking_memory_backend (preference)\n\
  \  - Count/List: \"How many books has Caroline read?\" → openviking_memory_backend\
  \ (count)\n  - Profile: \"What is Caroline's reading habit?\" → openviking_memory_backend\
  \ (profile_state)\n\nKey discriminators:\n  - Contains a person entity and an activity/artifact\
  \ category.\n  - No temporal anchor (when, last time, recently, before, after, during).\n\
  \  - No relationship between multiple people (with, together, both).\n  - No subjective\
  \ or evaluative language (why, feel, think, opinion).\n  - No quantification (how\
  \ many, count, total number).\n  - No preference signal (favorite, best, most liked,\
  \ prefer).\n"
