hard_negatives:
- query: When did Caroline buy the book?
  confusing_with_backend: streamlined_memory_backend
  reason: Contains temporal anchor "when" seeking a specific time point, not the artifact itself.
- query: How long has Melanie been reading novels?
  confusing_with_backend: streamlined_memory_backend
  reason: Asks for duration (how long), which is a temporal measurement, not an artifact lookup.
- query: What did Caroline and Melanie do together?
  confusing_with_backend: graph_memory_backend
  reason: Involves relationship between two people ("together"), seeking shared activity — graph scope.
- query: What activities do Caroline and Melanie share?
  confusing_with_backend: graph_memory_backend
  reason: Asks for commonality between two people ("share"), which is a graph relationship query.
- query: Why did Caroline read that book?
  confusing_with_backend: openviking_memory_backend
  reason: Asks for subjective reason/motivation ("why"), not the artifact itself.
- query: How did Melanie feel about the concert?
  confusing_with_backend: openviking_memory_backend
  reason: Seeks subjective feeling/opinion ("feel"), not the activity or artifact.
- query: What is Caroline's favorite book?
  confusing_with_backend: openviking_memory_backend
  reason: Contains preference signal ("favorite"), routing to preference template.
- query: What is Melanie's favorite place to visit?
  confusing_with_backend: openviking_memory_backend
  reason: Preference query with "favorite", not a neutral artifact lookup.
- query: How many books has Caroline read?
  confusing_with_backend: openviking_memory_backend
  reason: Quantification ("how many"), seeking a count rather than artifacts.
- query: What types of movies does Melanie watch?
  confusing_with_backend: openviking_memory_backend
  reason: Asks for categories/types ("types of"), which is a list/count pattern.
- query: What is Caroline's reading habit?
  confusing_with_backend: openviking_memory_backend
  reason: Seeks a profile/state description ("habit"), not concrete artifacts.
- query: What does Melanie usually do on weekends?
  confusing_with_backend: openviking_memory_backend
  reason: Asks for habitual pattern/profile state ("usually"), not specific artifacts.
- query: When was the last time Caroline visited a museum?
  confusing_with_backend: streamlined_memory_backend
  reason: Temporal anchor ("last time", "when") seeking recency, not the artifact.
- query: What did Caroline do before she read the book?
  confusing_with_backend: streamlined_memory_backend
  reason: Temporal sequencing ("before"), seeking prior event in timeline.
- query: What places has Caroline visited with Melanie?
  confusing_with_backend: graph_memory_backend
  reason: Involves two people ("with Melanie"), seeking co-visited places — graph scope.
- query: When did Melanie run a charity race?
  confusing_with_backend: streamlined_memory_backend
  reason: Temporal anchor "when" seeking event timestamp, not the activity itself.
- query: When is Melanie planning on going camping?
  confusing_with_backend: streamlined_memory_backend
  reason: Temporal planning query with "when", seeking future timestamp.
- query: When did Caroline give a speech at a school?
  confusing_with_backend: streamlined_memory_backend
  reason: Temporal anchor "when" seeking event time, not the speech content.
- query: When did Melanie sign up for a pottery class?
  confusing_with_backend: streamlined_memory_backend
  reason: Temporal query with "when did...sign up", seeking registration time.
- query: When did Caroline have a picnic?
  confusing_with_backend: streamlined_memory_backend
  reason: Temporal query with "when did", seeking event timestamp.
- query: When did Melanie go to the pottery workshop?
  confusing_with_backend: streamlined_memory_backend
  reason: Temporal query with "when did...go to", seeking attendance time.
- query: How long has Caroline had her current group of friends for?
  confusing_with_backend: streamlined_memory_backend
  reason: Duration query "how long", seeking temporal span not activity.
- query: How long ago was Caroline's 18th birthday?
  confusing_with_backend: streamlined_memory_backend
  reason: Temporal recency query, seeking elapsed time not event detail.
query_spec:
  search_mode: search
  openviking:
    context_type: memory
    target_uri: viking://memories
    skip_intent_analysis: true
    typed_query_template:
      intent: activity_artifact_lookup
      priority: 1
      target_directories: null
thresholds:
  accept: 0.54
  fallback: 0.44
  margin: 0.04
  hard_negative_margin: 0.03
  hard_negative_penalty: 0.15
calibration:
  min_positive_examples: 30
  min_hard_negatives: 12
  expected_fallback_rate: 0.2
