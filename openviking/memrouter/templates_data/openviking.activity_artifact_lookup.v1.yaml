hard_negatives:
- query: When did PERSON_A buy the book?
  confusing_with_backend: streamlined_memory_backend
  reason: Contains temporal anchor "when" seeking a specific time point, not the artifact
    itself.
- query: How long has PERSON_A been reading novels?
  confusing_with_backend: streamlined_memory_backend
  reason: Asks for duration (how long), which is a temporal measurement, not an artifact
    lookup.
- query: What did PERSON_A and PERSON_B do together?
  confusing_with_backend: graph_memory_backend
  reason: Involves relationship between two people ("together"), seeking shared activity
    — graph scope.
- query: What activities do PERSON_A and PERSON_B share?
  confusing_with_backend: graph_memory_backend
  reason: Asks for commonality between two people ("share"), which is a graph relationship
    query.
- query: Why did PERSON_A read that book?
  confusing_with_backend: openviking_memory_backend
  reason: Asks for subjective reason/motivation ("why"), not the artifact itself.
- query: How did PERSON_A feel about the concert?
  confusing_with_backend: openviking_memory_backend
  reason: Seeks subjective feeling/opinion ("feel"), not the activity or artifact.
- query: What is PERSON_A's favorite book?
  confusing_with_backend: openviking_memory_backend
  reason: Contains preference signal ("favorite"), routing to preference template.
- query: What is PERSON_A's favorite PLACE_X to visit?
  confusing_with_backend: openviking_memory_backend
  reason: Preference query with "favorite", not a neutral artifact lookup.
- query: How many books has PERSON_A read?
  confusing_with_backend: openviking_memory_backend
  reason: Quantification ("how many"), seeking a count rather than artifacts.
- query: What types of movies does PERSON_A watch from memory?
  confusing_with_backend: openviking_memory_backend
  reason: Asks for categories/types ("types of"), which is a list/count pattern.
- query: What is PERSON_A's reading habit?
  confusing_with_backend: openviking_memory_backend
  reason: Seeks a profile/state description ("habit"), not concrete artifacts.
- query: What does PERSON_A usually do on weekends?
  confusing_with_backend: openviking_memory_backend
  reason: Asks for habitual pattern/profile state ("usually"), not specific artifacts.
- query: When was the last time PERSON_A visited a museum?
  confusing_with_backend: streamlined_memory_backend
  reason: Temporal anchor ("last time", "when") seeking recency, not the artifact.
- query: What did PERSON_A do before she read the book?
  confusing_with_backend: streamlined_memory_backend
  reason: Temporal sequencing ("before"), seeking prior event in timeline.
- query: What places has PERSON_A visited with PERSON_B?
  confusing_with_backend: graph_memory_backend
  reason: Involves two people ("with Melanie"), seeking co-visited places — graph
    scope.
- query: At what time did PERSON_A run a charity race?
  confusing_with_backend: streamlined_memory_backend
  reason: Temporal anchor "when" seeking event timestamp, not the activity itself.
- query: When is PERSON_A planning on going camping?
  confusing_with_backend: streamlined_memory_backend
  reason: Temporal planning query with "when", seeking future timestamp.
- query: When did PERSON_A give a speech at a school?
  confusing_with_backend: streamlined_memory_backend
  reason: Temporal anchor "when" seeking event time, not the speech content.
- query: When did PERSON_A sign up for a pottery class?
  confusing_with_backend: streamlined_memory_backend
  reason: Temporal query with "when did...sign up", seeking registration time.
- query: When did PERSON_A have a picnic?
  confusing_with_backend: streamlined_memory_backend
  reason: Temporal query with "when did", seeking event timestamp.
- query: When did PERSON_A go to the pottery workshop?
  confusing_with_backend: streamlined_memory_backend
  reason: Temporal query with "when did...go to", seeking attendance time.
- query: How long has PERSON_A had her current group of friends for?
  confusing_with_backend: streamlined_memory_backend
  reason: Duration query "how long", seeking temporal span not activity.
- query: How long ago was PERSON_A's 18th birthday?
  confusing_with_backend: streamlined_memory_backend
  reason: Temporal recency query, seeking elapsed time not event detail.
- query: What did PERSON_A do on DATE_X?
  confusing_with_backend: graph_memory_backend
  reason: Query has a specific date anchor; should route to graph.timeline_fact.v1.
- query: What ARTIFACT_X did PERSON_A do recently on DATE_X?
  confusing_with_backend: graph_memory_backend
  reason: Time-anchored activity query, not a neutral artifact lookup.
- query: What ACTIVITY_X was PERSON_A doing in TIME_PERIOD?
