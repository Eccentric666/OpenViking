schema_version: mem-router.backend-route-template.v1
template_id: openviking.subjective_reasoning.v1
version: '1.0'
status: enabled
target:
  primary_backend_id: openviking_memory_backend
  secondary_backend_ids: []
intent_family:
  name: subjective_reasoning
  description: >-
    Queries that ask for subjective inference about a person's mental state,
    motivations, likely behavior, or reasoning. These include questions about
    preferences, feelings, decisions, reactions, personality, and hypothetical
    choices. Answering requires reasoning over memory evidence rather than
    direct fact lookup.
semantic_card: |
  This template captures queries that ask for SUBJECTIVE INFERENCE about a
  person's mental state, motivations, or likely behavior.

  Characteristic patterns include:
  - "Would X prefer A or B?" — hypothetical preference comparison
  - "Would X likely do Y?" — behavioral prediction
  - "Would X still want to do Y if Z?" — conditional desire
  - "Why did X decide to do Y?" — reasoning behind a decision
  - "How does X feel about Y?" — emotional state inference
  - "What would X's reaction be?" — predicted response
  - "What might X say about Y?" — likely statement
  - "How would X describe their experience?" — subjective framing
  - "What personality traits might X have?" — trait inference
  - "What would X likely pursue as a career?" — life trajectory prediction
  - "Would X enjoy Z?" — enjoyment prediction
  - "Would X be interested in Y?" — interest inference
  - "What motivates X to do Y?" — motivation analysis
  - "What is X's perspective on Y?" — viewpoint inference
  - "How does X prioritize Y?" — value hierarchy

  These queries require REASONING over memory evidence, not simple fact
  retrieval. The OpenViking IntentAnalyzer must synthesize multiple pieces
  of contextual information to infer mental states, motivations, or likely
  behaviors. skip_intent_analysis is FALSE because these queries demand
  OV's reasoning capability.
query_prototypes:
- Would Caroline prefer living in the city or the countryside?
- Would Melanie likely accept a job offer abroad?
- Would Caroline still want to become a doctor if she struggled with science?
- Why did Melanie decide to break up with her boyfriend?
- How does Caroline feel about her younger sister?
- What would Melanie's reaction be if she failed her exam?
- What might Caroline say about her high school experience?
- How would Melanie describe her first day at university?
- What personality traits might Caroline have based on her actions?
- What would Melanie likely pursue as a career after graduation?
- Would Caroline enjoy attending a classical music concert?
- Would Melanie be interested in joining a hiking club?
- What motivates Caroline to study so hard?
- What is Melanie's perspective on long-distance relationships?
- How does Caroline prioritize her family versus her career?
- Would X prefer tea or coffee in the morning?
- Would X likely move to a new city for a job?
- Would X still want to learn piano if lessons were expensive?
- Why did X choose to study engineering instead of medicine?
- How does X feel about their current job?
- What would X's reaction be to receiving unexpected criticism?
- What might X say about their childhood memories?
- How would X describe their experience traveling alone?
- What personality traits might X have that explain their generosity?
- What would X likely do if they won the lottery?
- Would X enjoy reading science fiction novels?
- Would X be interested in learning a new language?
- What motivates X to volunteer every weekend?
- What is X's perspective on working from home permanently?
- How does X prioritize saving money versus spending on experiences?
- Would Caroline be interested in trying extreme sports?
- What might Melanie say about her relationship with her parents?
- Why did Caroline decide to switch her major?
- How would Melanie feel about reconnecting with an old friend?
- What would likely motivate X to change careers mid-life?
- Would X prefer a stable routine or spontaneous adventures?
- What is Caroline's perspective on marriage and family?
- How does Melanie prioritize her mental health versus her ambitions?
- Would X likely forgive someone who betrayed their trust?
- What might X's reaction be to receiving a surprise gift?
- How would Caroline describe her ideal lifestyle?
- What personality traits might explain why Melanie is so organized?
- Would X enjoy living in a small town after years in a big city?
- What motivates Caroline to maintain her fitness routine?
- What is Melanie's perspective on taking risks in life?
hard_negatives:
- query: When did Caroline decide to become a doctor?
  confusing_with_backend: streamlined_memory_backend
  reason: Asks for a temporal decision point, not reasoning about motivation.
- query: How long has Melanie felt anxious about exams?
  confusing_with_backend: streamlined_memory_backend
  reason: Asks for duration of a feeling, not inference about mental state.
- query: What is Caroline's relationship with her roommate?
  confusing_with_backend: graph_memory_backend
  reason: Asks for a relational fact, not subjective inference.
- query: What do Caroline and Melanie have in common?
  confusing_with_backend: graph_memory_backend
  reason: Asks for commonalities between two people, not mental state reasoning.
- query: What is X's job?
  confusing_with_backend: openviking_memory_backend
  reason: Direct profile fact lookup; no reasoning about mental state needed.
- query: What books has Caroline read this year?
  confusing_with_backend: openviking_memory_backend
  reason: Activity artifact enumeration; purely factual retrieval.
- query: What is Melanie's favorite color?
  confusing_with_backend: openviking_memory_backend
  reason: Direct preference fact; does not require reasoning.
- query: How many friends does Caroline have?
  confusing_with_backend: openviking_memory_backend
  reason: Count/list query; no subjective inference required.
- query: When did X first express interest in art?
  confusing_with_backend: streamlined_memory_backend
  reason: Temporal query about first expression, not reasoning about motivation.
- query: How long has X been considering a career change?
  confusing_with_backend: streamlined_memory_backend
  reason: Duration query; seeks temporal span, not mental state inference.
- query: What is X's relationship with their manager?
  confusing_with_backend: graph_memory_backend
  reason: Relational fact query; graph memory handles these directly.
- query: What do X and their sibling disagree about?
  confusing_with_backend: graph_memory_backend
  reason: Commonality/difference query; graph memory is better suited.
- query: What is Caroline's email address?
  confusing_with_backend: openviking_memory_backend
  reason: Direct profile attribute; no reasoning whatsoever.
- query: What movies has Melanie watched recently?
  confusing_with_backend: openviking_memory_backend
  reason: Activity enumeration; factual retrieval without inference.
- query: How many times has X traveled to Japan?
  confusing_with_backend: openviking_memory_backend
  reason: Count query about past activities; no subjective reasoning needed.
# v5 — multi-entity subjective inference should be graph, not OV
- query: Which type of vacation would Evan prefer with his family, walking tours in metropolitan cities or camping trip in the outdoors?
  confusing_with_backend: graph_memory_backend
  reason: Involves a person + family group; asks about shared/group preference which is a relation/commonality query, not individual subjective inference.
- query: What would be an appropriate gift for both Evan and Sam to encourage their healthy lifestyles?
  confusing_with_backend: graph_memory_backend
  reason: Involves two people and asks about an action benefiting both; this is a co-occurrence/relation inference, not individual mental-state reasoning.
- query: How might Evan and Sam's experiences with health and lifestyle changes influence their approach to stress and challenges?
  confusing_with_backend: graph_memory_backend
  reason: Involves two people and asks about their shared/common approach, not individual subjective inference.
- query: How do Evan and Sam use creative outlets to cope with life's challenges?
  confusing_with_backend: graph_memory_backend
  reason: Involves two people and asks about their shared/common coping mechanism, which is a relation/commonality query.
- query: Based on the conversation, did Calvin and Dave have a meeting in Boston between August and November 2023?
  confusing_with_backend: graph_memory_backend
  reason: Involves two people + time range; asks about a shared event (meeting), which is a co-participation/relation query, not subjective inference.
query_spec:
  search_mode: search
  openviking:
    context_type: memory
    target_uri: viking://memories
    skip_intent_analysis: false
    typed_query_template:
      intent: subjective_reasoning
      priority: 1
      target_directories: null
thresholds:
  accept: 0.52
  fallback: 0.42
  margin: 0.04
  hard_negative_margin: 0.03
  hard_negative_penalty: 0.15
calibration:
  min_positive_examples: 25
  min_hard_negatives: 10
  expected_fallback_rate: 0.25
