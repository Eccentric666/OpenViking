- What types of music does PERSON_A listen to?
- What types of food does PERSON_A like?
- What types of movies does PERSON_A watch?
- What types of exercise does PERSON_A do?
- Which books has PERSON_A read?
- Which bands has PERSON_A listened to?
- Which movies has PERSON_A watched?
- Which countries has PERSON_A visited?
- Which restaurants has PERSON_A been to?
- What items has PERSON_A bought recently?
- What products does PERSON_A use?
- What tools does PERSON_A work with?
