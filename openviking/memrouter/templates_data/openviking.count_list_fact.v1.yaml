hard_negatives:
- query: How many days are there between PERSON_A's birthday and PERSON_B's birthday?
  confusing_with_backend: streamlined_memory_backend
  reason: Asks for a duration/computation between two dates, not a count of items
    from memory. Requires temporal calculation.
- query: How many times has PERSON_A gone to the gym in YEAR_X?
  confusing_with_backend: streamlined_memory_backend
  reason: Contains "how many times" but has a strong temporal anchor ("in 2024") that
    makes it a time-bounded frequency query best handled by streamlined backend.
- query: How many years has PERSON_A worked at PERSON_B?
  confusing_with_backend: streamlined_memory_backend
  reason: Asks for a duration derived from temporal boundaries (start date to present),
    not an enumeration from memory.
- query: Which things do PERSON_A and PERSON_B have in common in the remembered context?
  confusing_with_backend: graph_memory_backend
  reason: Asks for shared attributes between two entities, which is a relation/intersection
    query, not a list from a single entity's memory.
- query: Which detail is PERSON_A's favorite book?
  confusing_with_backend: openviking_memory_backend
  reason: Although about books, asks for a single preference item, not a list or count.
    Maps to personal_fact_lookup or preference template.
- query: Why did PERSON_A read "BOOK_TITLE"?
  confusing_with_backend: openviking_memory_backend
  reason: Asks for subjective reasoning/motivation behind an action, not a list or
    count of items.
- query: Which detail is PERSON_A's job?
  confusing_with_backend: openviking_memory_backend
  reason: Asks for a single profile state attribute, not an enumeration. Maps to profile_state
    template.
- query: What did PERSON_A buy at the store yesterday?
  confusing_with_backend: openviking_memory_backend
  reason: Contains "what did X buy" but has a specific temporal anchor ("yesterday")
    and asks for a single event's details, not a general list of purchased items.
- query: Where does PERSON_A live from memory?
  confusing_with_backend: openviking_memory_backend
  reason: Asks for a single location fact, not a list or count. Maps to profile_state
    template.
- query: What is PERSON_A's opinion on climate change?
  confusing_with_backend: openviking_memory_backend
  reason: Asks for a subjective opinion, not an enumeration. Maps to subjective_reasoning
    template.
- query: When did PERSON_A start learning piano?
  confusing_with_backend: streamlined_memory_backend
  reason: Asks for a specific timestamp/event time, not a list or count.
- query: How long did PERSON_A stay in PLACE_X?
  confusing_with_backend: streamlined_memory_backend
  reason: Asks for a duration, not a count of items or a list.
- query: Who introduced PERSON_A to jazz music?
  confusing_with_backend: graph_memory_backend
  reason: Asks for a specific relationship/connection between entities, not an enumeration
    from memory.
- query: What makes PERSON_A happy?
  confusing_with_backend: openviking_memory_backend
  reason: Asks for subjective emotional drivers, not a concrete list or count. Maps
    to subjective_reasoning.
- query: Is it true that PERSON_A married?
  confusing_with_backend: openviking_memory_backend
  reason: Asks for a binary profile state fact, not a list or count. Maps to profile_state
    template.
- query: How many times has PERSON_A gone to PLACE_X in TIME_PERIOD?
  confusing_with_backend: graph_memory_backend
  reason: Time-bounded frequency query should route to graph timeline fact.
- query: How many TIMES_UNIT did PERSON_A do ACTION_X in TIME_PERIOD?
  confusing_with_backend: graph_memory_backend
  reason: Time-bounded frequency query should route to graph timeline fact, not count
    list.
- query: How many times has PERSON_A done ACTION_X in TIME_PERIOD?
  confusing_with_backend: graph_memory_backend
  reason: Time-bounded frequency query should route to graph timeline fact.
- query: What ACTIVITY_X has PERSON_A been doing on DATE_X?
  confusing_with_backend: graph_memory_backend
  reason: Time-anchored activity query, not count/list.
- query: How many people attended EVENT_X in TIME_PERIOD?
  confusing_with_backend: graph_memory_backend
  reason: Event attendance count with time context, not general enumeration.
- query: How many times has PERSON_A attended EVENT_X in TIME_PERIOD?
  confusing_with_backend: graph_memory_backend
  reason: Time-bounded frequency query should route to graph timeline fact, not count
    list.
- query: What game has PERSON_A been playing on DATE_X?
  confusing_with_backend: graph_memory_backend
  reason: Time-anchored activity query should route to graph timeline fact, not count/list.
- query: What ACTIVITY_X is PERSON_A currently doing on DATE_X?
  confusing_with_backend: graph_memory_backend
  reason: Current activity with date anchor should route to graph timeline fact.
- query: What ACTIVITY_X did PERSON_A do on DATE_X?
  confusing_with_backend: graph_memory_backend
  reason: Time-anchored activity query should route to graph timeline fact, not count/list.
- query: What ITEM_X did PERSON_A have at age AGE_X?
  confusing_with_backend: graph_memory_backend
  reason: Personal possession fact with age context should route to graph timeline
    fact, not count/list.
- query: How many TIMES_UNIT did PERSON_A do ACTIVITY_X in TIME_PERIOD?
  confusing_with_backend: graph_memory_backend
  reason: Time-bounded frequency query should route to graph timeline fact, not count
    list fact.
- query: What ITEM_X did PERSON_A share with PERSON_B on DATE_X?
  confusing_with_backend: graph_memory_backend
  reason: Shared item query between two people should route to graph entity relation,
    not count/list.
- query: When did PERSON_A do ACTION_X?
  confusing_with_backend: graph_memory_backend
  reason: Temporal query should route to graph timeline fact, not count/list.
query_spec:
  search_mode: search
  openviking:
    context_type: memory
    target_uri: viking://memories
    skip_intent_analysis: true
    typed_query_template:
      intent: count_list_fact
      priority: 1
      target_directories: null
thresholds:
  accept: 0.53
  fallback: 0.43
  margin: 0.02
  hard_negative_margin: 0.03
  hard_negative_penalty: 0.06
calibration:
  min_positive_examples: 25
  min_hard_negatives: 10
  expected_fallback_rate: 0.25
