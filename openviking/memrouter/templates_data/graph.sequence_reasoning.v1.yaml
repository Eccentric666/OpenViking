schema_version: mem-router.backend-route-template.v1
template_id: graph.sequence_reasoning.v1
version: '1.0'
status: enabled
target:
  primary_backend_id: graph_memory_backend
  secondary_backend_ids: []
intent_family:
  name: graph_sequence_query
  description: Queries asking for event ordering, first/last occurrence, or relative
    sequence across remembered events.
semantic_card: 'Use this template only when the query asks which of two or more remembered
  events happened first, happened last, came before another event, or what the order
  of events was. Temporal ordering must be the core answer need. It is NOT for structured
  relation traversal, preference queries, or single timestamp lookups.

  '
query_prototypes:
- Which event happened first?
- Which event happened last?
- What happened first, EVENT_A or EVENT_B?
- What happened earlier, EVENT_A or EVENT_B?
- Which came first, EVENT_A or EVENT_B?
- Which came later, EVENT_A or EVENT_B?
- Which did I do first, ACTION_A or ACTION_B?
- Which task did I complete first?
- Which trip did I take first?
- Which device did I set up first?
- Which pet did PERSON_A adopt first?
- Which person became a parent first?
- What is the order of these events?
- Put these events in chronological order.
- Did EVENT_A happen before EVENT_B?
- Did EVENT_A happen after EVENT_B?
- Was EVENT_A earlier than EVENT_B?
- Was EVENT_A later than EVENT_B?
- Which of these happened most recently?
- Which was the earliest remembered event?
- Which event did I attend first, the EVENT_A or the EVENT_B?
- Which pet did PERSON_A adopt first, PET_A or PET_B?
- Which event happened first, the meeting with PERSON_A or the pride parade?
- Which event happened first, my attendance at a cultural festival or the start of
  my LANGUAGE_X classes?
- Which device did I set up first, the smart thermostat or the new router?
- Who became a parent first, PERSON_A or PERSON_B?
- Which trip did the narrator take first, the solo trip to PLACE_X or the family road
  trip?
- Which task did I complete first, fixing the fence or purchasing three cows?
- Which task did I complete first, fixing the fence or trimming the goats' hooves?
- Which happened earlier, buying the shoes or attending the book reading?
- Which of MEMORY_EVENT_A and MEMORY_EVENT_B occurred first?
- Did PERSONAL_EVENT_A occur before PERSONAL_EVENT_B?
- Order PERSONAL_EVENT_A, PERSONAL_EVENT_B, and PERSONAL_EVENT_C.
- Which remembered task came before TARGET_EVENT?
- Which remembered ACTIVITY_X happened most recently?
- 哪件事先发生？
- 这几件事的先后顺序是什么？
- A 和 B 哪个更早发生？
- 我先完成了哪项任务？
- 哪个活动是最近一次发生的？
hard_negatives:
- query: At what time did PERSON_A start ACTIVITY_X?
  confusing_with_backend: graph_memory_backend
  reason: Timestamp lookup, not ordering across events.
- query: Which place was PERSON_A on DATE_X in the remembered context?
  confusing_with_backend: graph_memory_backend
  reason: Date-constrained fact lookup, not sequence reasoning.
- query: What number of days passed between EVENT_A and EVENT_B?
  confusing_with_backend: graph_memory_backend
  reason: Duration calculation, not first/last ordering.
- query: How many weeks ago did EVENT_X happen?
  confusing_with_backend: graph_memory_backend
  reason: Elapsed-time question, not ordering.
- query: Which relationship does PERSON_A have with PERSON_B based on remembered facts?
  confusing_with_backend: graph_memory_backend
  reason: Entity relation query, not temporal sequence.
- query: What field anchors SYSTEM_SYNC_X in the remembered context?
  confusing_with_backend: graph_memory_backend
  reason: Technical dependency graph, not event order.
- query: Which factor caused SYSTEM_ISSUE_X in the user memory?
  confusing_with_backend: graph_memory_backend
  reason: Causal graph query, not temporal order.
- query: Which books has PERSON_A read in the user memory?
  confusing_with_backend: openviking_memory_backend
  reason: Personal fact lookup, not ordering.
- query: Which items did PERSON_A buy from memory?
  confusing_with_backend: openviking_memory_backend
  reason: Personal fact list, not event sequence.
- query: What is PERSON_A's ethnicity?
  confusing_with_backend: openviking_memory_backend
  reason: Profile fact, not temporal sequence.
- query: What did PERSON_A go through before EVENT_X?
  confusing_with_backend: openviking_memory_backend
  reason: Personal narrative fact, not sequence ordering.
thresholds:
  accept: 0.66
  fallback: 0.56
  margin: 0.04
  hard_negative_margin: 0.03
  hard_negative_penalty: 0.06
calibration:
  min_positive_examples: 30
  min_hard_negatives: 15
  expected_fallback_rate: 0.2
